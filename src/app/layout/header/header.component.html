<!-- HEADER -->
<header class="bg-white shadow-lg">
  <div
    id="cabecera"
    class="hidden lg:flex items-center justify-between px-6 py-4"
  >
    <a [routerLink]="['/']" class="flex-shrink-0">
      <img
        id="opium-logo"
        src="/assets/img/mix/banner_opium.png"
        alt="Logo"
        class="h-16 md:h-20"
      />
    </a>
    <div class="apps-icons hidden lg:flex items-center gap-3">
      <a
        href="https://itunes.apple.com/es/app/futmondo-manager-de-futbol/id663530434?mt=8"
        title="Ir a Apple Store"
        target="_blank"
        rel="noopener noreferrer"
      >
        <img
          src="/assets/img/icons/logo_market_ios.png"
          alt="Apple Store"
          class="h-10 w-auto transition-transform hover:scale-110"
        />
      </a>
      <a
        href="https://play.google.com/store/apps/details?id=com.mondosports.futmondo"
        title="Ir a Google Play"
        target="_blank"
        rel="noopener noreferrer"
      >
        <img
          src="/assets/img/icons/logo_market_android.png"
          alt="Google Play"
          class="h-10 w-auto transition-transform hover:scale-110"
        />
      </a>
    </div>
  </div>
</header>
